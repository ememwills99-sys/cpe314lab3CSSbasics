<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Basics</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="lab3-styles.css">

    <!-- Internal CSS -->
    <style>
        h1 {
            font-style: italic;
            text-decoration: underline;
        }

        .box {
            border: 2px solid black;
            padding: 20px;
            margin: 20px;
            background-color: white;
        }
    </style>
</head>
<body>

    <!-- Updated Heading -->
    <h1>22/EG/CO/1642</h1>

    <p>This paragraph uses external CSS.</p>

    <!-- New div element -->
    <div class="box">
        This is a styled div with border, padding, and margin.
    </div>

</body>
</html>
